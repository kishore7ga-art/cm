<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z Preview</title>
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="preload" as="image" href="./moodboard-preview.jpg">
  <style>
    :root {
      --bg: #130f11;
      --panel: #1a171a;
      --line: rgba(109, 172, 236, 0.28);
      --accent: #74b7ff;
      --accent-strong: #1b4f90;
      --cream: #f2edde;
      --muted: rgba(242, 237, 222, 0.7);
      --shadow: rgba(6, 14, 27, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: "Times New Roman", Georgia, serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 22px 18px 18px;
      background:
        radial-gradient(circle at top, rgba(68, 111, 183, 0.15), transparent 34%),
        linear-gradient(180deg, #181114 0%, var(--bg) 46%);
    }

    .app {
      width: min(96vw, 1280px);
      display: grid;
      gap: 18px;
    }

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand-mark {
      width: clamp(110px, 16vw, 170px);
      height: auto;
      flex: 0 0 auto;
      filter: drop-shadow(0 14px 28px rgba(4, 10, 21, 0.28));
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy p,
    .brand-copy h1 {
      margin: 0;
    }

    .brand-copy p {
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .brand-copy h1 {
      margin-top: 6px;
      font-size: clamp(1.5rem, 3vw, 2.6rem);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .frame {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 50px var(--shadow);
    }

    .image-download {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
    }

    .frame img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      background: #0a0806;
    }

    .actions {
      display: grid;
      justify-items: center;
    }

    .credit {
      margin: 0;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .download {
      appearance: none;
      border: 1px solid rgba(139, 193, 255, 0.8);
      border-radius: 999px;
      background: linear-gradient(135deg, #b8dbff 0%, var(--accent) 35%, var(--accent-strong) 100%);
      color: #081322;
      padding: 14px 24px;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(11, 33, 64, 0.28);
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        gap: 12px;
      }

      .masthead,
      .brand {
        align-items: flex-start;
      }

      .brand {
        gap: 12px;
      }

      .brand-copy h1 {
        font-size: 1.35rem;
      }

      .download {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
  <body>
  <main class="app">
    <header class="masthead">
      <div class="brand">
        <img class="brand-mark" src="./logo.svg" alt="Blue Z logo" width="170" height="112">
        <div class="brand-copy">
          <p>kishore.GA</p>
          <h1>Z Preview</h1>
        </div>
      </div>
    </header>

    <section class="frame">
      <a
        class="image-download"
        id="imageDownloadButton"
        href="./Beige Aesthetics Photo Collage Moodboard.png"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
        aria-label="Download HD image"
      >
        <img
          id="previewImage"
          src="./moodboard-preview.jpg"
          alt="Beige Aesthetics Photo Collage Moodboard"
          width="1600"
          height="1280"
          decoding="async"
          fetchpriority="high"
        >
      </a>
    </section>

    <div class="actions">
      <a
        class="download"
        id="downloadButton"
        href="./Beige Aesthetics Photo Collage Moodboard.png"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
      >Download HD Image</a>
    </div>
    <p class="credit">made by kishore.GA</p>
  </main>
</body>
</html>
