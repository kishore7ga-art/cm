<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Image Preview</title>
  <style>
    :root {
      --bg: #0a0806;
      --panel: #14110d;
      --line: rgba(201, 168, 76, 0.42);
      --gold: #c9a84c;
      --cream: #f0ead6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: "Times New Roman", Georgia, serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(96vw, 1280px);
      display: grid;
      gap: 16px;
    }

    .frame {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
    }

    .image-download {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
    }

    .frame img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      background: #0a0806;
    }

    .actions {
      display: grid;
      justify-items: center;
    }

    .download {
      appearance: none;
      border: 1px solid var(--gold);
      border-radius: 999px;
      background: var(--gold);
      color: #0a0806;
      padding: 14px 24px;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        gap: 12px;
      }

      .download {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
  <body>
  <main class="app">
    <section class="frame">
      <a
        class="image-download"
        id="imageDownloadButton"
        href="#"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
        aria-label="Download HD image"
      >
        <img
          id="previewImage"
          src=""
          alt="Beige Aesthetics Photo Collage Moodboard"
        >
      </a>
    </section>

    <div class="actions">
      <a
        class="download"
        id="downloadButton"
        href="#"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
      >Download HD Image</a>
    </div>
  </main>
  <script src="./image-data.js"></script>
  <script>
    (function () {
      const image = document.getElementById("previewImage");
      const imageDownloadButton = document.getElementById("imageDownloadButton");
      const downloadButton = document.getElementById("downloadButton");
      const base64 = window.HD_IMAGE_BASE64 || "";

      function base64ToBlob(base64Text, mimeType) {
        const chunks = [];
        const chunkSize = 32768;

        for (let index = 0; index < base64Text.length; index += chunkSize) {
          const slice = base64Text.slice(index, index + chunkSize);
          const binary = window.atob(slice);
          const bytes = new Uint8Array(binary.length);

          for (let offset = 0; offset < binary.length; offset += 1) {
            bytes[offset] = binary.charCodeAt(offset);
          }

          chunks.push(bytes);
        }

        return new Blob(chunks, { type: mimeType });
      }

      if (!base64) {
        return;
      }

      const blob = base64ToBlob(base64, "image/png");
      const objectUrl = URL.createObjectURL(blob);

      image.src = objectUrl;
      imageDownloadButton.href = objectUrl;
      downloadButton.href = objectUrl;

      window.addEventListener("beforeunload", function () {
        URL.revokeObjectURL(objectUrl);
      });
    }());
  </script>
</body>
</html>
