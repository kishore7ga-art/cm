<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HD Image Preview</title>
  <link rel="preload" as="image" href="./moodboard-preview.jpg">
  <style>
    :root {
      --bg: #0a0806;
      --panel: #14110d;
      --line: rgba(201, 168, 76, 0.42);
      --gold: #c9a84c;
      --cream: #f0ead6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: "Times New Roman", Georgia, serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(96vw, 1280px);
      display: grid;
      gap: 16px;
    }

    .frame {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
    }

    .image-download {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      text-decoration: none;
    }

    .frame img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      background: #0a0806;
    }

    .actions {
      display: grid;
      justify-items: center;
    }

    .download {
      appearance: none;
      border: 1px solid var(--gold);
      border-radius: 999px;
      background: var(--gold);
      color: #0a0806;
      padding: 14px 24px;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .app {
        gap: 12px;
      }

      .download {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
  <body>
  <main class="app">
    <section class="frame">
      <a
        class="image-download"
        id="imageDownloadButton"
        href="./Beige Aesthetics Photo Collage Moodboard.png"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
        aria-label="Download HD image"
      >
        <img
          id="previewImage"
          src="./moodboard-preview.jpg"
          alt="Beige Aesthetics Photo Collage Moodboard"
          width="1600"
          height="1280"
          decoding="async"
          fetchpriority="high"
        >
      </a>
    </section>

    <div class="actions">
      <a
        class="download"
        id="downloadButton"
        href="./Beige Aesthetics Photo Collage Moodboard.png"
        download="Beige Aesthetics Photo Collage Moodboard HD.png"
      >Download HD Image</a>
    </div>
  </main>
</body>
</html>
