<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Blue Z logo</title>
  <desc id="desc">A metallic blue letter Z with sweeping arcs above and below.</desc>
  <defs>
    <linearGradient id="metal-body" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%" stop-color="#b4e3ff"/>
      <stop offset="18%" stop-color="#5ca6ea"/>
      <stop offset="52%" stop-color="#154c95"/>
      <stop offset="100%" stop-color="#071a44"/>
    </linearGradient>
    <linearGradient id="metal-edge" x1="0%" y1="20%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#dff4ff"/>
      <stop offset="35%" stop-color="#8dd0ff"/>
      <stop offset="100%" stop-color="#12386e"/>
    </linearGradient>
    <linearGradient id="metal-sheen" x1="10%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#031124" flood-opacity="0.32"/>
    </filter>
  </defs>

